# Prose Pod API
# REST API for administrating a Prose Pod
# Configuration file
# Template: https://github.com/prose-im/prose-pod-system/blob/master/templates/prose.toml
# All keys: https://github.com/prose-im/prose-pod-api/blob/master/src/service/src/features/app_config/mod.rs

[branding]
company_name = "Prose (test)"

[server]
domain = "test.local"

[notifiers.email]
smtp_host = "mailpit"
smtp_encrypt = false

[backups.storage]
provider = "fs"
# This is just for debugging purposes (because this path is mounted using
# Docker), don’t do that in production!
fs.directory = "/var/lib/prose-backups"
